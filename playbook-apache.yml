---
- name: Install & Configure Apache (httpd) web server
  hosts:
    - web_backend
  become: true

  vars:
    site_domain: "{{ ansible_fqdn }}"
    http_port: 80
    https_port: 443
    config_files: files
    config_files_conf: "{{ config_files }}/conf_httpd"
    config_files_ssl: "{{ config_files }}/ssl"
    conf_path: /etc/httpd
    ssl_path: /etc/pki/tls
    ssl_path_site: "{{ ssl_path }}/{{ site_domain }}"
    content_path: /srv/www
    content_path_site: "{{ content_path }}/{{ site_domain }}"

  roles:
    - name: apache

  tasks:
    - name: Create document root
      ansible.builtin.file:
        path: "{{ content_path_site }}/html"
        state: directory
        mode: '0755'

    - name: Create cgi-bin directory
      ansible.builtin.file:
        path: "{{ content_path_site }}/cgi-bin"
        state: directory
        mode: '0755'

    - name: Recursively change ownership of www directory
      ansible.builtin.file:
        path: "{{ content_path }}"
        state: directory
        recurse: true
        owner: root
        group: root

    - name: Tell SELinux to treat the new site html path as web content
      ansible.builtin.shell: |
        semanage fcontext -a -t httpd_sys_content_t "{{ content_path_site }}/html(/.*)?"
        restorecon -Rv {{ content_path_site }}/html

    - name: Tell SELinux to treat the new site cgi-bin path for CGI scripts
      ansible.builtin.shell: |
        semanage fcontext -a -t httpd_sys_script_exec_t "{{ content_path_site }}/cgi-bin(/.*)?"
        restorecon -Rv {{ content_path_site }}/cgi-bin

    - name: Create site-specific dir for SSL files
      ansible.builtin.file:
        path: "{{ ssl_path_site }}"
        state: directory
        mode: '0700'

    - name: Copy site-specific SSL files to dir
      ansible.builtin.copy:
        src: "{{ config_files_ssl }}/{{ item }}"
        dest: "{{ ssl_path_site }}"
        mode: '0700'
      loop:
        - "{{ site_ssl_crt }}"
        - "{{ site_ssl_key }}"

    - name: Create site-specific .conf file from template
      ansible.builtin.template:
        src: "{{ config_files_conf }}/httpd-server.j2"
        dest: "{{ conf_path }}/conf.d/{{ site_domain }}.conf"
        owner: root
        group: root
        mode: '0644'
        backup: false

    - name: Backup some default .conf files
      ansible.builtin.shell: |
        mv "{{ conf_path }}/conf.d/ssl.conf" "{{ conf_path }}/conf.d/ssl.orig"
        mv "{{ conf_path }}/conf.d/welcome.conf" "{{ conf_path }}/conf.d/welcome.orig"


    - name: Copy over some replacements for above .conf files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ conf_path }}/conf.d/"
        owner: root
        group: root
        mode: '0644'
      loop:
        - "{{ config_files_conf }}/aaaa.default.servername.conf"
        - "{{ config_files_conf }}/ssl.conf"


    # WEB CONTENT UPDATE TASKS - BEGIN:
    - name: Ensure web content directory is emptied first.
      ansible.builtin.shell: |
        rm -rf {{ content_path_site }}/html/*
        rm -rf {{ content_path_site }}/cgi-bin/*
      tags:
        - content_update

    - name: Create temp dir for downloaded repo
      ansible.builtin.tempfile:
        state: directory
      register: temp_dir_content
      tags:
        - content_update

    - name: Report temp dir location
      ansible.builtin.debug:
        msg: "Temp dir created at: {{ temp_dir_content.path }}."
      tags:
        - content_update

    # BELOW TASK MAY NOT BE NECESSARY?
    - name: First mark the temp_dir as safe for non-owner to clone to
      ansible.builtin.command:
        cmd: "git config --global --add safe.directory {{ temp_dir_content.path }}"
      tags:
        - content_update

    - name: Get web content and code from Git repo using SSH key
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "{{ temp_dir_content.path }}"
        key_file: /home/ansible/.ssh/id_ed25519
        version: main
        accept_hostkey: true
      tags:
        - content_update

    - name: Copy static content
      ansible.builtin.copy:
        src: "{{ temp_dir_content.path }}/html/"
        dest: "{{ content_path_site }}/html"
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      tags:
        - content_update

    - name: Copy dynamic content
      ansible.builtin.copy:
        src: "{{ temp_dir_content.path }}/cgi-bin/"
        dest: "{{ content_path_site }}/cgi-bin"
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      tags:
        - content_update

    - name: Remove temp directory
      ansible.builtin.file:
        path: "{{ temp_dir_content.path }}"
        state: absent
      tags:
        - content_update

    # WEB CONTENT UPDATE TASKS - END.

    - name: Restart httpd system service
      ansible.builtin.systemd_service:
        name: httpd
        state: restarted

    - name: Open web server ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ http_port }}"
        - "{{ https_port }}"

...
